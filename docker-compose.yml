services:
  api:
    build:
      context: .
      dockerfile: python/Dockerfile
    restart: unless-stopped
    command: python3 -m uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  grpc-server:
    build:
      context: .
      dockerfile: python/Dockerfile
    restart: unless-stopped 
    command: python3 grpc_server.py
    expose:
      - "50051"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('localhost', 50051), timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5

  go-bridge:
    build:
      context: ./go
      dockerfile: Dockerfile
    restart: unless-stopped 
    ports:
      - "8080:8080"
    depends_on:
      grpc-server:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: torontoCensusVisualizer/Dockerfile
    restart: unless-stopped 
    ports:
      - "80:80" 
    depends_on:
      - go-bridge

  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  caddy_data:
  caddy_config: