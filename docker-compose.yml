services:
  api:
    build:
      context: .
      dockerfile: python/Dockerfile
    command: python3 -m uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  grpc-server:
    build:
      context: .
      dockerfile: python/Dockerfile
    command: python3 grpc_server.py
    expose:
      - "50051"

  go-bridge:
    build:
      context: .
      dockerfile: go/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - grpc-server
  frontend:
    build:
      context: .
      dockerfile: torontoCensusVisualizer/Dockerfile
    ports:
      - "5173:5173"


      