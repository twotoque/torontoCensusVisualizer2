services:
  api:
    build:
      context: .
      dockerfile: python/Dockerfile
    command: python3 -m uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  grpc-server:
    build:
      context: .
      dockerfile: python/Dockerfile
    command: python3 grpc_server.py
    expose:
      - "50051"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('localhost', 50051), timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  go-bridge:
    build:
      context: ./go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      grpc-server:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: torontoCensusVisualizer/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./torontoCensusVisualizer:/app
      - node_modules:/app/node_modules
    depends_on:
      - go-bridge

volumes:
  node_modules: